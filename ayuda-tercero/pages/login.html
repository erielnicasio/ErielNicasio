<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso y Registro - Ayuda a un Tercero</title>
  <link rel="stylesheet" href="../assets/css/styles.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 100%);
      padding: 40px 24px;
      position: relative;
      overflow: hidden;
    }
    .auth-page::before {
      content: '';
      position: absolute;
      width: 150%;
      height: 150%;
      background: radial-gradient(circle, rgba(255,255,255,.04) 0%, transparent 70%);
      top: -25%;
      left: -25%;
      pointer-events: none;
    }
    .auth-card {
      max-width: 480px;
      width: 100%;
      background: var(--white);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-xl);
      overflow: hidden;
      position: relative;
      z-index: 10;
      animation: fadeInUp .6s var(--ease);
    }
    .auth-header {
      text-align: center;
      padding: 40px 24px 20px;
    }
    .auth-logo-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 56px;
      height: 56px;
      border-radius: var(--radius-md);
      background: linear-gradient(135deg, var(--navy), var(--royal));
      color: var(--white);
      margin-bottom: 16px;
    }
    .auth-tabs {
      display: flex;
      border-bottom: 1px solid var(--gray-200);
      background: var(--gray-50);
    }
    .auth-tab {
      flex: 1;
      text-align: center;
      padding: 16px;
      font-size: .9rem;
      font-weight: 700;
      color: var(--text-muted);
      cursor: pointer;
      border-bottom: 3px solid transparent;
      transition: var(--transition);
      background: transparent;
      border-top: none;
      border-left: none;
      border-right: none;
      font-family: var(--font-body);
    }
    .auth-tab:hover { color: var(--navy); }
    .auth-tab.active {
      color: var(--navy);
      border-bottom-color: var(--orange);
      background: var(--white);
    }
    .auth-body { padding: 36px; }
    .auth-form { display: none; animation: fadeIn .3s var(--ease); }
    .auth-form.active { display: block; }
    .auth-footer {
      text-align: center;
      padding: 20px 36px 32px;
      font-size: .85rem;
      color: var(--text-muted);
    }
    .auth-footer a { color: var(--orange); font-weight: 600; }
    .remember-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: .85rem;
      margin-bottom: 20px;
    }
    .remember-row a { color: var(--royal); font-weight: 600; }
  </style>
</head>
<body>

  <main class="auth-page">
    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-logo-icon"><i data-lucide="heart-handshake" style="width:28px;height:28px"></i></div>
        <h1 style="font-family:var(--font-body);font-size:1.5rem;font-weight:800;color:var(--navy);margin-bottom:6px">Bienvenido</h1>
        <p style="color:var(--text-muted);font-size:.9rem">Accede a tu cuenta o regístrate</p>
      </div>

      <div class="auth-tabs">
        <button class="auth-tab active" onclick="switchTab('login')">Iniciar Sesión</button>
        <button class="auth-tab" onclick="switchTab('register')">Registrarse</button>
      </div>

      <div class="auth-body">
        <!-- Login Form -->
        <form class="auth-form active" id="loginForm" onsubmit="event.preventDefault();doLogin()">
          <div class="form-group">
            <label class="form-label">Correo Electrónico</label>
            <input type="email" class="form-control" id="loginEmail" placeholder="tu@correo.com" required>
          </div>
          <div class="form-group">
            <label class="form-label">Contraseña</label>
            <input type="password" class="form-control" id="loginPass" placeholder="Tu contraseña" required>
          </div>
          <div class="remember-row">
            <label class="flex items-center gap-8" style="cursor:pointer">
              <input type="checkbox"> Recordarme
            </label>
            <a href="#">¿Olvidaste tu contraseña?</a>
          </div>
          <button type="submit" class="btn btn--primary btn--full">Iniciar Sesión</button>
        </form>

        <!-- Register Form -->
        <form class="auth-form" id="registerForm" onsubmit="event.preventDefault();doRegister()">
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Nombre</label>
              <input type="text" class="form-control" id="regName" placeholder="Tu nombre" required>
            </div>
            <div class="form-group">
              <label class="form-label">Apellido</label>
              <input type="text" class="form-control" id="regLast" placeholder="Tu apellido" required>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Correo Electrónico</label>
            <input type="email" class="form-control" id="regEmail" placeholder="tu@correo.com" required>
          </div>
          <div class="form-group">
            <label class="form-label">Celular</label>
            <input type="tel" class="form-control" id="regPhone" placeholder="809-555-0001" required>
          </div>
          <div class="form-group">
            <label class="form-label">Contraseña</label>
            <input type="password" class="form-control" id="regPass" placeholder="Mínimo 8 caracteres" required minlength="8">
          </div>
          <div class="form-group">
            <label class="flex items-center gap-8" style="cursor:pointer;font-size:.85rem;color:var(--text-secondary)">
              <input type="checkbox" required> Acepto los <a href="legal.html#terminos" style="color:var(--orange);font-weight:600">Términos y Condiciones</a>
            </label>
          </div>
          <button type="submit" class="btn btn--primary btn--full">Crear Cuenta</button>
        </form>
      </div>

      <div class="auth-footer">
        <a href="../index.html"><i data-lucide="arrow-left" style="width:14px;height:14px;display:inline;vertical-align:middle"></i> Volver al inicio</a>
      </div>
    </div>
  </main>

  <script src="../assets/js/db.js"></script>
  <script src="../assets/js/main.js"></script>
  <script>
    function switchTab(tab) {
      document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
      if (tab === 'login') {
        document.querySelectorAll('.auth-tab')[0].classList.add('active');
        document.getElementById('loginForm').classList.add('active');
      } else {
        document.querySelectorAll('.auth-tab')[1].classList.add('active');
        document.getElementById('registerForm').classList.add('active');
      }
    }

    function doLogin() {
      const email = document.getElementById('loginEmail').value;
      localStorage.setItem('user_session', JSON.stringify({ email, logged: true }));
      showToast('Sesión iniciada correctamente.');
      setTimeout(() => window.location.href = 'perfil.html', 1000);
    }

    function doRegister() {
      const user = {
        name: document.getElementById('regName').value + ' ' + document.getElementById('regLast').value,
        email: document.getElementById('regEmail').value,
        phone: document.getElementById('regPhone').value,
        logged: true
      };
      localStorage.setItem('user_session', JSON.stringify(user));
      showToast('Cuenta creada exitosamente.');
      setTimeout(() => window.location.href = 'perfil.html', 1000);
    }
  </script>
</body>
</html>
